name: Deploy VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: procharts-vm-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ProCharting Demo
    runs-on: [self-hosted, procharts-vm]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: bash scripts/deploy-vm.sh
