name: Update Admin Credentials Runtime

on:
  workflow_dispatch:

concurrency:
  group: procharts-admin-credentials-runtime
  cancel-in-progress: false

jobs:
  update-admin-credentials:
    name: Update Admin Credentials
    runs-on: [self-hosted, procharts-vm]
    timeout-minutes: 30
    env:
      ADMIN_USERNAME: ${{ secrets.PROCHARTS_ADMIN_RUNTIME_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.PROCHARTS_ADMIN_RUNTIME_PASSWORD }}
      SUDO_PASSWORD: ${{ secrets.PROCHARTS_VM_SUDO_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update server-only admin env
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${ADMIN_USERNAME:-}" || -z "${ADMIN_PASSWORD:-}" || -z "${SUDO_PASSWORD:-}" ]]; then
            echo "Required admin runtime secrets are missing." >&2
            exit 1
          fi

          sudo_with_password() {
            printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"
          }

          env_file="/etc/procharts/app.env"
          tmp="$(mktemp)"
          next="$(mktemp)"
          trap 'rm -f "$tmp" "$next"' EXIT

          if sudo_with_password test -f "$env_file"; then
            sudo_with_password cat "$env_file" > "$tmp"
          else
            : > "$tmp"
          fi

          upsert_env() {
            local key="$1"
            local value="$2"
            local line
            printf -v line '%s=%q' "$key" "$value"
            awk -v key="$key" -v line="$line" '
              index($0, key "=") == 1 {
                print line
                found = 1
                next
              }
              { print }
              END {
                if (!found) {
                  print line
                }
              }
            ' "$tmp" > "$next"
            mv "$next" "$tmp"
          }

          upsert_env "PROCHARTS_ADMIN_USERNAME" "$ADMIN_USERNAME"
          upsert_env "PROCHARTS_ADMIN_PASSWORD" "$ADMIN_PASSWORD"

          sudo_with_password install -d -m 0750 -o root -g ooo /etc/procharts
          sudo_with_password install -m 0640 -o root -g ooo "$tmp" "$env_file"

          sudo_with_password bash -c 'set -euo pipefail; set -a; source /etc/procharts/app.env; set +a; [[ -n "${PROCHARTS_ADMIN_USERNAME:-}" && -n "${PROCHARTS_ADMIN_PASSWORD:-}" ]]'
          echo "Admin credential env keys are present."

      - name: Deploy app with updated env
        shell: bash
        run: bash scripts/deploy-vm.sh

      - name: Compare deployed admin env
        shell: bash
        run: |
          set -euo pipefail

          sudo_with_password() {
            printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"
          }

          env_copy="$(mktemp)"
          trap 'rm -f "$env_copy"' EXIT

          sudo_with_password cat /etc/procharts/app.env > "$env_copy"
          set -a
          # shellcheck disable=SC1090
          source "$env_copy"
          set +a

          server_username_matches=false
          server_password_matches=false
          [[ "${PROCHARTS_ADMIN_USERNAME:-}" == "$ADMIN_USERNAME" ]] && server_username_matches=true
          [[ "${PROCHARTS_ADMIN_PASSWORD:-}" == "$ADMIN_PASSWORD" ]] && server_password_matches=true

          printf 'server_env_username_matches=%s\n' "$server_username_matches"
          printf 'server_env_password_matches=%s\n' "$server_password_matches"
          printf 'server_env_password_length=%s\n' "${#PROCHARTS_ADMIN_PASSWORD}"
          printf 'requested_password_length=%s\n' "${#ADMIN_PASSWORD}"

          if [[ "$server_username_matches" != "true" || "$server_password_matches" != "true" ]]; then
            echo "Server env file does not match requested admin credentials." >&2
            exit 1
          fi

          app_pid="$(pm2 pid procharts-app | tr -d '[:space:]')"
          if [[ -z "$app_pid" || "$app_pid" == "0" ]]; then
            echo "Could not find procharts-app PM2 pid." >&2
            exit 1
          fi

          node - "$app_pid" <<'NODE'
          const fs = require("fs");
          const pid = process.argv[2];
          const raw = fs.readFileSync(`/proc/${pid}/environ`, "utf8");
          const runtimeEnv = Object.fromEntries(
            raw
              .split("\0")
              .filter(Boolean)
              .map((entry) => {
                const separator = entry.indexOf("=");
                return [entry.slice(0, separator), entry.slice(separator + 1)];
              })
          );

          const usernameMatches = runtimeEnv.PROCHARTS_ADMIN_USERNAME === process.env.ADMIN_USERNAME;
          const passwordMatches = runtimeEnv.PROCHARTS_ADMIN_PASSWORD === process.env.ADMIN_PASSWORD;

          console.log(`pm2_env_username_matches=${usernameMatches}`);
          console.log(`pm2_env_password_matches=${passwordMatches}`);
          console.log(`pm2_env_password_length=${runtimeEnv.PROCHARTS_ADMIN_PASSWORD?.length ?? -1}`);
          console.log(`requested_password_length=${process.env.ADMIN_PASSWORD.length}`);

          if (!usernameMatches || !passwordMatches) {
            console.error("PM2 process env does not match requested admin credentials.");
            process.exit(1);
          }
          NODE

      - name: Verify local admin access
        shell: bash
        run: |
          set -euo pipefail

          body="$(mktemp)"
          trap 'rm -f "$body"' EXIT

          status="$(curl -sS -o "$body" -w "%{http_code}" -H "Accept: application/json" "http://127.0.0.1:3000/admin/users" || true)"
          if [[ "$status" != "401" ]]; then
            echo "Expected unauthenticated admin users request to return HTTP 401, got $status." >&2
            exit 1
          fi

          auth_header="$(node -e 'process.stdout.write(Buffer.from(`${process.env.ADMIN_USERNAME}:${process.env.ADMIN_PASSWORD}`, "utf8").toString("base64"))')"
          status="$(curl -sS -o "$body" -w "%{http_code}" -H "Authorization: Basic $auth_header" "http://127.0.0.1:3000/admin/users" || true)"
          if [[ "$status" != "200" ]]; then
            echo "Expected authenticated admin users request to return HTTP 200, got $status." >&2
            exit 1
          fi

          if ! grep -q "User administration" "$body"; then
            echo "Authenticated admin request did not reach the users page." >&2
            exit 1
          fi

          if ! grep -q "Supabase users" "$body"; then
            echo "Admin users table was not rendered." >&2
            exit 1
          fi

          if grep -q "Admin users panel is disabled" "$body"; then
            echo "Admin users panel is disabled after deployment." >&2
            exit 1
          fi

          echo "Admin access verification passed."
