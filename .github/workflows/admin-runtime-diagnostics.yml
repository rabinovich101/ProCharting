name: Admin Runtime Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnose-admin-runtime:
    name: Diagnose Admin Runtime
    runs-on: [self-hosted, procharts-vm]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Diagnose admin credentials
        shell: bash
        run: |
          set -euo pipefail

          env_file="/etc/procharts/app.env"
          if [[ ! -f "$env_file" ]]; then
            echo "server_env=missing"
            exit 1
          fi

          set -a
          # shellcheck disable=SC1090
          source "$env_file"
          set +a

          if [[ -z "${PROCHARTS_ADMIN_USERNAME:-}" || -z "${PROCHARTS_ADMIN_PASSWORD:-}" ]]; then
            echo "admin_env_keys=missing"
            exit 1
          fi

          echo "admin_env_keys=present"
          echo "admin_env_password_length=${#PROCHARTS_ADMIN_PASSWORD}"

          credential_file="${PROCHARTS_ADMIN_CREDENTIALS_FILE:-$HOME/.procharts/admin-credentials.json}"
          echo "credential_file_path_configured=$([[ -n "${PROCHARTS_ADMIN_CREDENTIALS_FILE:-}" ]] && echo true || echo false)"

          if [[ -f "$credential_file" ]]; then
            echo "credential_file=present"
            node -e '
              const fs = require("fs");
              const file = process.argv[1];
              try {
                const parsed = JSON.parse(fs.readFileSync(file, "utf8"));
                console.log(`credential_file_version=${parsed.version ?? "missing"}`);
                console.log(`credential_file_algorithm=${parsed.algorithm ?? "missing"}`);
                console.log(`credential_file_hash_present=${typeof parsed.passwordHash === "string" && parsed.passwordHash.length > 0}`);
              } catch {
                console.log("credential_file_invalid=true");
              }
            ' "$credential_file"
          else
            echo "credential_file=missing"
          fi

          check_login() {
            local base_url="$1"
            local label="$2"
            local headers body status location
            headers="$(mktemp)"
            body="$(mktemp)"

            status="$(curl -sS -D "$headers" -o "$body" -w "%{http_code}" \
              --data-urlencode "username=$PROCHARTS_ADMIN_USERNAME" \
              --data-urlencode "password=$PROCHARTS_ADMIN_PASSWORD" \
              "$base_url/admin/login" || true)"
            location="$(awk 'BEGIN { IGNORECASE = 1 } /^location:/ { print $0 }' "$headers")"
            rm -f "$headers" "$body"

            echo "${label}_login_status=$status"
            if [[ "$location" == *"/admin/users"* ]]; then
              echo "${label}_login_location=users"
              return 0
            fi
            if [[ "$location" == *"error=credentials"* ]]; then
              echo "${label}_login_location=credentials_error"
              return 2
            fi
            if [[ "$location" == *"error=rate"* ]]; then
              echo "${label}_login_location=rate_error"
              return 3
            fi
            if [[ "$location" == *"error=config"* ]]; then
              echo "${label}_login_location=config_error"
              return 4
            fi

            echo "${label}_login_location=other"
            return 1
          }

          set +e
          check_login "http://127.0.0.1:3000" "local"
          local_result="$?"
          set -e

          if [[ "$local_result" == "2" && -f "$credential_file" ]]; then
            backup_file="${credential_file}.ignored-before-admin-settings-$(date +%Y%m%d%H%M%S)"
            mv "$credential_file" "$backup_file"
            echo "credential_file_moved_aside=true"

            set +e
            check_login "http://127.0.0.1:3000" "local_after_credential_file_move"
            local_result="$?"
            set -e
          fi

          set +e
          check_login "https://procharts.thefiscalwire.com" "public"
          public_result="$?"
          set -e

          if [[ "$local_result" != "0" || "$public_result" != "0" ]]; then
            pm2 logs procharts-app --lines 80 --nostream || true
            exit 1
          fi
