name: Enable Admin Users Runtime

on:
  workflow_dispatch:

concurrency:
  group: procharts-admin-runtime
  cancel-in-progress: false

jobs:
  enable:
    name: Enable admin users runtime
    runs-on: [self-hosted, procharts-vm]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure server-only admin env
        env:
          ADMIN_PASSWORD: ${{ secrets.PROCHARTS_ADMIN_RUNTIME_PASSWORD }}
          ADMIN_USERNAME: ${{ secrets.PROCHARTS_ADMIN_RUNTIME_USERNAME }}
          SUDO_PASSWORD: ${{ secrets.PROCHARTS_VM_SUDO_PASSWORD }}
        run: |
          set -euo pipefail

          app_env="/etc/procharts/app.env"
          supabase_env="/home/ooo/procharts-supabase/runtime/.env"

          if [ -z "${ADMIN_USERNAME:-}" ] || [ -z "${ADMIN_PASSWORD:-}" ]; then
            echo "Admin runtime credentials are missing from GitHub Actions secrets." >&2
            exit 1
          fi

          if [ -z "${SUDO_PASSWORD:-}" ]; then
            echo "VM sudo password is missing from GitHub Actions secrets." >&2
            exit 1
          fi

          if [ ! -r "$supabase_env" ]; then
            echo "Production Supabase runtime env is not readable: $supabase_env" >&2
            exit 1
          fi

          sudo_with_password() {
            printf '%s\n' "$SUDO_PASSWORD" | sudo -S -p '' "$@"
          }

          service_role_key="$(
            awk -F= '$1 == "SERVICE_ROLE_KEY" { sub(/^[^=]*=/, ""); print; exit }' "$supabase_env"
          )"

          if [ -z "$service_role_key" ]; then
            echo "Production Supabase SERVICE_ROLE_KEY is missing." >&2
            exit 1
          fi

          tmp="$(mktemp)"
          if sudo_with_password test -f "$app_env"; then
            sudo_with_password cat "$app_env" > "$tmp"
          fi

          upsert_env() {
            key="$1"
            value="$2"
            next_tmp="$(mktemp)"
            awk -F= -v key="$key" -v value="$value" '
              BEGIN { found=0 }
              $0 !~ /^[[:space:]]*#/ && $0 !~ /^[[:space:]]*$/ {
                k=$1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", k)
                if (k == key) {
                  print key "=" value
                  found=1
                  next
                }
              }
              { print }
              END { if (!found) print key "=" value }
            ' "$tmp" > "$next_tmp"
            mv "$next_tmp" "$tmp"
          }

          upsert_env PROCHARTS_ADMIN_USERNAME "$ADMIN_USERNAME"
          upsert_env PROCHARTS_ADMIN_PASSWORD "$ADMIN_PASSWORD"
          upsert_env SUPABASE_SERVICE_ROLE_KEY "$service_role_key"
          upsert_env SUPABASE_URL "http://127.0.0.1:8000"

          sudo_with_password install -d -m 0750 -o root -g ooo "$(dirname "$app_env")"
          sudo_with_password install -m 0640 -o root -g ooo "$tmp" "$app_env"
          rm -f "$tmp"

          for key in PROCHARTS_ADMIN_USERNAME PROCHARTS_ADMIN_PASSWORD SUPABASE_SERVICE_ROLE_KEY SUPABASE_URL; do
            if sudo_with_password awk -F= -v key="$key" '
              BEGIN { found=0 }
              $0 !~ /^[[:space:]]*#/ && $0 !~ /^[[:space:]]*$/ {
                k=$1
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", k)
                if (k == key) {
                  sub(/^[^=]*=/, "")
                  found=(length($0) > 0 ? 1 : 0)
                }
              }
              END { exit(found ? 0 : 1) }
            ' "$app_env"; then
              echo "$key=present"
            else
              echo "$key=missing" >&2
              exit 1
            fi
          done

      - name: Redeploy app
        run: bash scripts/deploy-vm.sh

      - name: Verify admin users route
        env:
          ADMIN_PASSWORD: ${{ secrets.PROCHARTS_ADMIN_RUNTIME_PASSWORD }}
          ADMIN_USERNAME: ${{ secrets.PROCHARTS_ADMIN_RUNTIME_USERNAME }}
        run: |
          set -euo pipefail

          unauthenticated_status="$(
            curl -sS -o /tmp/admin-users-unauthenticated.html -w "%{http_code}" \
              http://127.0.0.1:3000/admin/users
          )"
          if [ "$unauthenticated_status" != "401" ]; then
            echo "Expected unauthenticated admin route to return 401, got $unauthenticated_status." >&2
            exit 1
          fi

          curl -fsS -u "$ADMIN_USERNAME:$ADMIN_PASSWORD" \
            http://127.0.0.1:3000/admin/users \
            -o /tmp/admin-users-authenticated.html

          if grep -q "Admin users panel is disabled" /tmp/admin-users-authenticated.html; then
            echo "Admin users route is still disabled after runtime env configuration." >&2
            exit 1
          fi

          grep -q "Supabase users" /tmp/admin-users-authenticated.html
          grep -q "User administration" /tmp/admin-users-authenticated.html

          public_status="$(
            curl -sS -u "$ADMIN_USERNAME:$ADMIN_PASSWORD" \
              -o /tmp/admin-users-public.html \
              -w "%{http_code}" \
              https://procharts.thefiscalwire.com/admin/users
          )"
          if [ "$public_status" != "200" ]; then
            echo "Expected public admin route to return 200 with auth, got $public_status." >&2
            exit 1
          fi

          if grep -q "Admin users panel is disabled" /tmp/admin-users-public.html; then
            echo "Public admin users route is still disabled after deploy." >&2
            exit 1
          fi

          grep -q "Supabase users" /tmp/admin-users-public.html
          echo "admin_users_route=verified"
